# Temporal repo-steward worker — Kubernetes Deployment
#
# The worker container spawns `codex app-server` as an in-process child on
# startup (src/worker.ts → startCodexAppServerProcess).  No sidecar needed —
# auth.json is mounted directly in the worker container.
#
# Secrets required
# ----------------
#   codex-auth                  Opaque with key auth.json (from `codex login`)
#   temporal-repo-steward-env   Opaque with envvars (GITHUB_TOKEN, etc.)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-repo-steward-worker
  labels:
    app: temporal-repo-steward-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-repo-steward-worker
  template:
    metadata:
      labels:
        app: temporal-repo-steward-worker
    spec:
      containers:
        - name: worker
          image: temporal-repo-steward:latest
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
            - name: TEMPORAL_TASK_QUEUE
              value: repo-steward
            - name: HOME
              value: /home/agent
          envFrom:
            - secretRef:
                name: temporal-repo-steward-env
          volumeMounts:
            - name: codex-auth
              mountPath: /home/agent/.codex/auth.json
              subPath: auth.json
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi

      volumes:
        - name: codex-auth
          secret:
            secretName: codex-auth
            defaultMode: 0600
