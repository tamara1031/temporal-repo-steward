# Local dev stack: Temporal dev server + repo-steward worker (Go).
#
# Usage:
#   cp .env.example .env   # fill in required vars
#   docker compose up -d --build
#   docker compose logs -f worker
#
# Trigger a workflow once both are up:
#   docker compose exec temporal temporal workflow start \
#       --task-queue repo-steward \
#       --workflow-id smoke-$(date +%s) \
#       --type PeriodicRefactorWorkflow \
#       --input '{"RepoFullName":"owner/repo","BaseBranch":"main","Brief":"improve test coverage"}'

services:
  temporal:
    image: temporalio/temporal:latest
    container_name: agent-temporal
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --log-level
      - warn
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "namespace", "list", "--address", "127.0.0.1:7233"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: temporal-repo-steward:dev
    container_name: agent-worker
    depends_on:
      temporal:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TLS: "false"
      WORKSPACE_ROOT: /workspaces
      LOG_LEVEL: debug
    volumes:
      - workspaces:/workspaces
      - ${HOME}/.codex/auth.json:/home/agent/.codex/auth.json:ro
    restart: unless-stopped

volumes:
  workspaces:
